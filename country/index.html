<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Country Profile — Mission 300 | SEforALL</title>
  <meta name="description" content="Detailed National Energy Compact profile.">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../styles-pages.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>

  <main id="page-content">
    <div class="container">
      <nav class="breadcrumb" id="breadcrumb"></nav>
    </div>

    <div id="profileContent" class="profile-page">
      <!-- Rendered by profile.js -->
      <div class="container" style="padding:80px 24px;text-align:center">
        <p style="color:var(--gray-400)">Loading country profile...</p>
      </div>
    </div>

    <div class="container" style="text-align:center;padding:32px 0 64px">
      <a href="../countries/" class="btn btn-outline" style="color:var(--navy);border-color:var(--navy)">
        &larr; Back to All Countries
      </a>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../data.js"></script>
  <script src="../utils.js"></script>
  <script src="../charts.js"></script>
  <script src="../components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initComponents();

      const iso = getQueryParam('id');
      const data = iso ? getCountryByISO(iso) : null;

      if (!data) {
        document.getElementById('profileContent').innerHTML = `
          <div class="container" style="padding:120px 24px;text-align:center">
            <h2 style="color:var(--dark-navy);font-family:var(--font-display);text-transform:uppercase;margin-bottom:16px">Country Not Found</h2>
            <p style="color:var(--gray-400)">No data available for this country. <a href="../countries/" style="color:var(--navy)">Browse all countries</a>.</p>
          </div>`;
        return;
      }

      // Update page title
      document.title = `${data.country} — Mission 300 | SEforALL`;

      // Render breadcrumbs
      renderBreadcrumbs('breadcrumb', [
        { label: 'Dashboard', href: resolvePath('') },
        { label: 'Countries', href: resolvePath('countries/') },
        { label: data.country }
      ]);

      // Render the profile
      if (data.compact) {
        renderCompactProfile(data, 'profileContent');
      } else {
        renderSimpleProfile(data, 'profileContent');
      }
    });
  </script>
</body>
</html>
