<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countries — Mission 300 | SEforALL</title>
  <meta name="description" content="Browse and filter all 30 Mission 300 country profiles.">
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../styles-pages.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div id="site-header"></div>

  <main id="page-content">
    <div class="page-hero page-hero-sm">
      <div class="container">
        <div class="page-hero-content">
          <span class="section-tag">Country Profiles</span>
          <h1 class="page-title">30 Nations, One Mission</h1>
          <p class="page-subtitle">Filter and explore each country's National Energy Compact — from current access rates to 2030 targets and investment commitments.</p>
        </div>
      </div>
    </div>

    <section class="section section-alt">
      <div class="container">
        <div class="filters-section">
          <div class="filter-group">
            <span class="filter-group-label">Cohort</span>
            <div class="filter-bar" id="cohortFilters">
              <button class="filter-btn active" data-filter="all" data-type="cohort">All <span class="filter-count">30</span></button>
              <button class="filter-btn" data-filter="Cohort 1" data-type="cohort">Cohort 1 <span class="filter-count">12</span></button>
              <button class="filter-btn" data-filter="Cohort 2" data-type="cohort">Cohort 2 <span class="filter-count">18</span></button>
            </div>
          </div>

          <div class="filter-group">
            <span class="filter-group-label">Region</span>
            <div class="filter-bar" id="regionFilters">
              <button class="filter-btn active" data-filter="all" data-type="region">All Regions</button>
              <button class="filter-btn" data-filter="West Africa" data-type="region">West Africa <span class="filter-count">11</span></button>
              <button class="filter-btn" data-filter="East Africa" data-type="region">East Africa <span class="filter-count">8</span></button>
              <button class="filter-btn" data-filter="Central Africa" data-type="region">Central Africa <span class="filter-count">6</span></button>
              <button class="filter-btn" data-filter="Southern Africa" data-type="region">Southern Africa <span class="filter-count">5</span></button>
            </div>
          </div>

          <div class="filter-group">
            <span class="filter-group-label">Language</span>
            <div class="filter-bar" id="languageFilters">
              <button class="filter-btn active" data-filter="all" data-type="language">All</button>
              <button class="filter-btn" data-filter="French" data-type="language">French <span class="filter-count">15</span></button>
              <button class="filter-btn" data-filter="English" data-type="language">English <span class="filter-count">15</span></button>
            </div>
          </div>
        </div>

        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="countrySearch" placeholder="Search countries...">
        </div>

        <div class="active-filters-summary" id="filterSummary"></div>

        <div class="country-grid" id="countryGrid"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../data.js"></script>
  <script src="../utils.js"></script>
  <script src="../charts.js"></script>
  <script src="../components.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initComponents();
      renderCountryCards('countryGrid', { linkToProfile: true });
      initFilters();
      initSearch();
      initScrollAnimations();
    });
  </script>
</body>
</html>
